<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Snatchers</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==">
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #111; font-family: 'Courier New', Courier, monospace; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .hud-box { pointer-events: auto; background: rgba(0, 0, 0, 0.85); color: white; padding: 15px; border-radius: 8px; position: absolute; border: 2px solid #3498db; }
        #top-left { top: 20px; left: 20px; }
        #top-right { top: 20px; right: 20px; }
        #events-menu { top: 240px; right: 20px; }
        #upgrades-menu { bottom: 20px; right: 20px; }
        button { background: #3498db; color: white; border: none; padding: 10px; cursor: pointer; font-weight: bold; border-radius: 5px; margin-top: 5px; width: 100%; display: block; }
        button:hover { background: #2980b9; }
        input { padding: 8px; border-radius: 4px; border: none; outline: none; width: 80%; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="top-left" class="hud-box">
            <h2>💰 $<span id="money-display">0</span></h2>
            <p>Friend Code: <strong id="friend-code-display">...</strong></p>
        </div>

        <div id="top-right" class="hud-box">
            <h3>Join Friend</h3>
            <input type="text" id="join-code-input" placeholder="Enter Code" maxlength="6">
            <button id="join-btn">Join Lobby</button>
        </div>

        <div id="events-menu" class="hud-box">
            <h3>🎡 Daily Event</h3>
            <button id="spin-wheel-btn">Spin Wheel</button>
        </div>

        <div id="admin-menu" class="hud-box" style="position: absolute; top: 150px; left: 20px; z-index: 9999;">
            <h3 style="color: #f1c40f;">👑 Admin Panel</h3>
            <select id="admin-rarity-select">
                <option value="Regular">Regular</option>
                <option value="Diamond">Diamond</option>
                <option value="Azure">Azure</option>
            </select>
            <button id="admin-spawn-btn" class="admin-btn">Force Spawn</button>
            <br><br>
            <button id="admin-weather-btn" class="admin-btn" style="background: #27ae60;">Toggle Weather</button>
            <button id="admin-illegal-btn" class="admin-btn" style="background: #000; color: red;">Give Illegal</button>
        </div>

        <div id="upgrades-menu" class="hud-box">
            <h3>🛠️ Base Upgrades</h3>
            <p>Status: <strong id="base-status" style="color: #e74c3c;">🔓 UNLOCKED</strong></p>
            <button id="lock-base-btn">Lock Base</button>
            <button id="upgrade-capacity-btn">Upgrade Capacity ($5k)</button>
            <button id="upgrade-lock-btn">Upgrade Lock Time ($2.5k)</button>
        </div>
    </div>

    <link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module" src="./firebase-setup.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script type="module" src="./game.js"></script>
</body>
</html>
