<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Snatchers: Brainrot Edition</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #2c3e50; font-family: 'Courier New', Courier, monospace; }
        #gameCanvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .hud-box { pointer-events: auto; background: rgba(0, 0, 0, 0.7); color: white; padding: 15px; border-radius: 8px; position: absolute; border: 2px solid #fff; }
        #top-left { top: 20px; left: 20px; }
        #top-right { top: 20px; right: 20px; }
        #base-menu { bottom: 20px; left: 20px; display: none; } /* Shows up when in base */
        button { background: #e74c3c; color: white; border: none; padding: 10px; cursor: pointer; font-weight: bold; border-radius: 5px; margin-top: 5px; }
        button:hover { background: #c0392b; }
        input { padding: 8px; border-radius: 4px; border: none; outline: none; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="top-left" class="hud-box">
            <h2>💰 $<span id="money-display">0</span></h2>
            <p>Friend Code: <strong id="friend-code-display">...</strong></p>
        </div>

        <div id="top-right" class="hud-box">
            <h3>Join Friend</h3>
            <input type="text" id="join-code-input" placeholder="Enter Code" maxlength="6">
            <button id="join-btn">Join Lobby</button>
        </div>

        <div id="base-menu" class="hud-box">
            <h3>🏠 Your Base</h3>
            <p>Animals Stored: <span id="base-count">0</span>/10</p>
            <button id="sell-all-btn">Sell All Unlocked Animals</button>
            <button id="claim-egg-btn">Claim Weekly Egg</button>
        </div>
    </div>

    <script type="module" src="./firebase-setup.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="./game.js"></script>
</body>
</html>
