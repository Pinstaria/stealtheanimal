<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Snatchers - Steal a Brainrot</title>
    <style>
        /* --- RESET & CANVAS SETUP --- */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; /* Prevents accidentally highlighting text while playing */
        }
        
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* --- UI LAYER (HUD) --- */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Lets you click "through" the UI to drag the camera */
            z-index: 100;
        }

        .hud-box {
            background: rgba(30, 39, 46, 0.85);
            border: 2px solid #34495e;
            border-radius: 10px;
            padding: 15px;
            color: white;
            pointer-events: auto; /* Makes buttons inside the box clickable */
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* --- SPECIFIC UI PLACEMENTS --- */
        #top-center-hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #2ecc71;
        }

        #top-right-hud {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
        }

        #admin-menu {
            position: absolute;
            top: 20px;
            left: 20px;
            display: none; /* Hidden by default until Firebase confirms you are an Admin */
        }

        /* --- BUTTONS & INPUTS --- */
        input, select {
            padding: 8px;
            margin: 5px 0;
            border-radius: 5px;
            border: 1px solid #7f8c8d;
            background: #2c3e50;
            color: white;
        }

        button {
            padding: 8px 15px;
            margin: 5px 2px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        
        button:hover { opacity: 0.9; transform: scale(1.05); }
        button:active { transform: scale(0.95); }

        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #27ae60; color: white; }
        .btn-red { background: #c0392b; color: white; border: 1px solid #ff0000; }
        
        /* Crosshair for the center of the screen */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="crosshair"></div>

    <div id="ui-layer">
        
        <div id="top-center-hud" class="hud-box">
            💰 $<span id="money-display">0</span>
        </div>

        <div id="top-right-hud" class="hud-box">
            <h3 style="margin: 0 0 10px 0; color: #3498db;">Server: <span id="friend-code-display">CONNECTING...</span></h3>
            <input type="text" id="join-code-input" placeholder="Enter 6-Digit Code" maxlength="6" style="width: 120px;">
            <button id="join-btn" class="btn-blue">Join</button>
            <p style="font-size: 12px; color: #bdc3c7; margin-top: 10px;">
                [W, A, S, D] Move<br>
                [Right-Click Drag] Rotate Camera<br>
                [Spacebar] Steal / Grab Item<br>
                [E] Buy Capacity (at Blue Pad)
            </p>
        </div>

        <div id="admin-menu" class="hud-box">
            <h3 style="margin: 0 0 10px 0; color: #f1c40f;">👑 Admin Panel</h3>
            
            <select id="admin-rarity-select">
                <option value="Regular">Regular</option>
                <option value="White">White</option>
                <option value="Red">Red</option>
                <option value="Orange">Orange</option>
                <option value="yellow">Yellow</option>
                <option value="green">Green</option>
                <option value="blue">Blue</option>
                <option value="purple">Purple</option>
                <option value="pink">Pink</option>
                <option value="Teal">Teal</option>
                <option value="Fuchsia">Fuchsia</option>
                <option value="Turquoise">Turquoise</option>
                <option value="Gold">Gold</option>
                <option value="Diamond">Diamond</option>
                <option value="Rainbow">Rainbow</option>
                <option value="Crimson">Crimson</option>
                <option value="Platinum">Platinum</option>
                <option value="Coral">Coral</option>
                <option value="Canary">Canary</option>
                <option value="Charteasue">Charteasue</option>
                <option value="Azure">Azure</option>
            </select>
            <button id="admin-spawn-btn" class="btn-blue">Force Drop</button>
            
            <hr style="border-color: #7f8c8d; margin: 10px 0;">
            
            <button id="admin-weather-btn" class="btn-green">Toggle Weather</button>
            <button id="admin-illegal-btn" class="btn-red">Give Illegal</button>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script type="module" src="game.js"></script>

</body>
</html>
